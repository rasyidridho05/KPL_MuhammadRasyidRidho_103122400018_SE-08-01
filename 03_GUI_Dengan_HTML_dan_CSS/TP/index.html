<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Convert Text Style</title>
    <link rel="stylesheet" href="style.css" />
    <script src="index.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="body">
      <h1>Pengkonversi Gaya Teks</h1>
      <p>
        Alat ini bisa mengubah teks menjadi huruf besar, huruf kecil, dan
        paragraf.
      </p>
      <label for="editor-kecil">Masukkan teks:</label>
      <textarea
        class="kotak-input"
        id="editor-kecil"
        rows="10"
        cols="60"
        placeholder="Kata-kata..."
      ></textarea>
      <p>
        Huruf: <span id="hf">0</span>, huruf besar: <span id="hb">0</span>,
        huruf kecil: <span id="hk">0</span>
      </p>
      <div>
        <button id="huruf-besar">Besarkan</button>
        <button id="huruf-kecil">Kecilkan</button>
        <button id="huruf-paragraf">Paragrafkan</button>
      </div>
    </div>
  </body>
</html>
